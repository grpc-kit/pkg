    - method: grpc_kit.api.known.admin.v1.KnownAdmin.CreateAuthToken
      option:
        tags:
          - "认证鉴权"
        summary: "创建访问令牌"
        description: '接口格式：/builtin/admin/api/v1/auth/token。用于受控场景下签发 access_token。前置条件：仅允许受信任客户端或后台作业调用，服务端应审计令牌签发主体、scope 与 expires_in。请求体示例：{"appid":"admin-web","username":"admin","password_hash":"8c6976e5b5410415bde908bd4dee15dfb16b0f5f","expires_in":7200}。'
        responses:
          "200":
            examples:
              "application/json": '{"access_token":"eyJhbGciOiJSUzI1NiIsImtpZCI6ImtpZC1zZXJ2aWNlLTIwMjYifQ.eyJzdWIiOiIxIiwidXNlcm5hbWUiOiJhZG1pbiIsInNjb3BlIjoiYWRtaW4iLCJleHAiOjE3OTk5OTk5OTl9.signature","token_type":"Bearer","expires_in":7200}'
    - method: grpc_kit.api.known.admin.v1.KnownAdmin.ListAuthProviders
      option:
        tags:
          - "认证鉴权"
        summary: "认证提供商列表"
        description: "接口格式：/builtin/admin/api/v1/auth/providers。返回可用的认证方式（LOCAL/LDAP/OIDC/OAUTH2/GITHUB/GOOGLE/WECHAT）。前置条件：仅允许具备认证配置读取权限的管理员调用，返回结果禁止包含 client_secret、bind_password 等敏感字段。"
        responses:
          "200":
            examples:
              "application/json": '{"providers":[{"id":"1","code":"corp-ldap","type":"LDAP","status":"ACTIVE","display_name":"企业LDAP","description":"企业统一身份源","sort_order":20,"icon_url":"https://cdn.example.com/icons/ldap.svg"}],"next_page_token":"providers:2","total_size":12}'
    - method: grpc_kit.api.known.admin.v1.KnownAdmin.CreateAuthProvider
      option:
        tags:
          - "认证鉴权"
        summary: "创建认证提供商"
        description: '接口格式：/builtin/admin/api/v1/auth/providers。用于创建 LDAP/OIDC/OAUTH2 等认证提供商配置。前置条件：仅允许具备最小权限的管理员调用，涉及 client_secret、bind_password 等敏感配置时应脱敏存储并写入审计日志。请求体示例：{"provider":{"code":"corp-ldap","type":"LDAP","status":"ACTIVE","display_name":"企业LDAP","description":"企业统一身份源"}}。'
        responses:
          "200":
            examples:
              "application/json": '{"id":"2","code":"corp-ldap","type":"LDAP","status":"ACTIVE","display_name":"企业LDAP","description":"仅企业员工可登录","sort_order":20,"icon_url":"https://cdn.example.com/icons/ldap.svg"}'
    - method: grpc_kit.api.known.admin.v1.KnownAdmin.GetAuthProvider
      option:
        tags:
          - "认证鉴权"
        summary: "获取认证提供商详情"
        description: "接口格式：/builtin/admin/api/v1/auth/providers/{id}。前置条件：仅允许具备认证配置读取权限的管理员调用，响应中禁止回传 client_secret、bind_password 等敏感字段。"
        responses:
          "200":
            examples:
              "application/json": '{"id":"2","code":"corp-ldap","type":"LDAP","status":"ACTIVE","display_name":"企业LDAP","description":"仅企业员工可登录","sort_order":20,"icon_url":"https://cdn.example.com/icons/ldap.svg"}'
    - method: grpc_kit.api.known.admin.v1.KnownAdmin.DeleteAuthProvider
      option:
        tags:
          - "认证鉴权"
        summary: "删除认证提供商"
        description: "接口格式：/builtin/admin/api/v1/auth/providers/{id}。删除指定认证提供商。前置条件：仅允许具备最小权限的管理员调用，删除前应确认无活动登录流量并记录审计日志。"
        responses:
          "200":
            examples:
              "application/json": '{}'
    - method: grpc_kit.api.known.admin.v1.KnownAdmin.UpdateAuthProvider
      option:
        tags:
          - "认证鉴权"
        summary: "更新认证提供商"
        description: '接口格式：/builtin/admin/api/v1/auth/providers/{id}。按请求字段更新 provider 配置。前置条件：仅允许具备最小权限的管理员调用，涉及密钥或绑定口令变更时必须脱敏存储并写入审计日志。请求体示例：{"id":"2","provider":{"display_name":"企业LDAP（更新）","status":"ACTIVE"},"update_mask":{"paths":["display_name","status"]}}。'
        responses:
          "200":
            examples:
              "application/json": '{"id":"2","code":"corp-ldap","type":"LDAP","status":"ACTIVE","display_name":"企业LDAP（更新）","description":"新增安全基线策略","sort_order":10,"icon_url":"https://cdn.example.com/icons/ldap.svg"}'
    - method: grpc_kit.api.known.admin.v1.KnownAdmin.GetAuthCallback
      option:
        tags:
          - "认证鉴权"
        summary: "第三方认证回调"
        description: "接口格式：/builtin/admin/api/v1/auth/callback/{provider_name}。用于 OIDC/OAUTH2 等外部认证回调换取 token。前置条件：state 与 provider_name 必须匹配已发起的登录会话，服务端应审计回调来源并禁止重复消费授权码。"
        responses:
          "200":
            examples:
              "application/json": '{"access_token":"<jwt>","token_type":"Bearer"}'
