      option:
        swagger: "2.0"
        info:
          title: "known-admin-v1"
          contact:
            name: "admin.v1.known"
            url: "http://admin.v1.known.api.grpc-kit.com"
          license:
            name: "Apache License 2.0"
            url: "https://github.com/grpc-kit/cli/blob/main/LICENSE"
          version: "0.1.19"
        host: "admin.v1.known.api.grpc-kit.com"
        base_path: "/"
        schemes:
          - "HTTP"
        consumes:
          - "application/json"
        produces:
          - "application/json"
        securityDefinitions:
          security:
            BasicAuth:
              type: "TYPE_BASIC"
            ApiKeyAuth:
              type: "TYPE_API_KEY"
              in: "IN_HEADER"
              name: "Authorization: Bearer <token>"
        security:
          - securityRequirement:
              BasicAuth: {}
          - securityRequirement:
              ApiKeyAuth: {}
        responses:
          "4xx":
            description: "客户端参数异常"
            schema:
              jsonSchema:
                ref: ".grpc_kit.api.known.status.v1.ErrorResponse"
          "5xx":
            description: "服务端处理异常"
            schema:
              jsonSchema:
                ref: ".grpc_kit.api.known.status.v1.ErrorResponse"
        external_docs:
          description: 'Code generated by "grpc-kit-cli/0.3.8-beta.1"'
          url: "https://grpc-kit.com"

  # grpc.gateway.protoc_gen_openapiv2.options.Operation
  # 对应 proto 中 service 的 rpc
  method:
    - method: grpc_kit.api.known.admin.v1.KnownAdmin.CreateAuthLogin
      option:
        tags:
          - "认证鉴权"
        summary: "登录认证"
        description: '接口格式：/builtin/admin/api/v1/auth/login。LOCAL: password_hash=sha256(password)；LDAP: password_hash=base64(password)（兼容约定）。前置条件：provider_code 必须处于启用状态，服务端应审计登录失败与来源 IP，并对连续失败触发限流或锁定策略。请求体示例：{"username":"alice","password_hash":"3f786850e387550fdab836ed7e6dc881de23001b","provider_code":"local","expires_in":86400}。'
        responses:
          "200":
            examples:
              "application/json": '{"access_token":"eyJhbGciOiJSUzI1NiIsImtpZCI6ImtpZC1hZG1pbi0yMDI2In0.eyJzdWIiOiIxMDAxIiwidXNlcm5hbWUiOiJhbGljZSIsInJvbGVzIjpbImF1ZGl0b3IiXSwic2NvcGUiOiJhZG1pbiByZWFkb25seSIsImV4cCI6MTc5OTk5OTk5OX0.signature","token_type":"Bearer","expires_in":86400}'
    - method: grpc_kit.api.known.admin.v1.KnownAdmin.ListLocalConfigs
      option:
        tags:
          - "本地配置"
        summary: "本地配置模块列表"
        description: "接口格式：/builtin/admin/api/v1/local/configs。返回可查询模块及其启用状态。"
        responses:
          "200":
            examples:
              "application/json": '{"configs":[{"name":"services","enabled":true},{"name":"security","enabled":true},{"name":"database","enabled":false}]}'
    - method: grpc_kit.api.known.admin.v1.KnownAdmin.GetLocalConfigs
      option:
        tags:
          - "本地配置"
        summary: "按模块获取本地配置"
        description: "接口格式：/builtin/admin/api/v1/local/configs/{name}。按模块返回对应配置快照。"
        responses:
          "200":
            examples:
              "application/json": '{"security":{"name":"security","enabled":true,"authentication":{"insecure_rpcs":["grpc.health.v1.Health/Check"],"http_users":[{"user_id":"1","username":"admin","groups":["root"],"tenant":"default"}]}}}'
    - method: grpc_kit.api.known.admin.v1.KnownAdmin.GetGlobalSettings
